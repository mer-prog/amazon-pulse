name: Supabase Keepalive

# Free-tier Supabase projects auto-pause after 7 days of inactivity. This
# workflow pings the REST endpoint every 3 days to keep the project warm
# during development and between releases. Required GitHub Actions secrets:
#   SUPABASE_URL          (e.g. https://xxxxxxxxxxxx.supabase.co)
#   SUPABASE_ANON_KEY     (the public anon key — RLS still applies)

on:
  schedule:
    - cron: '0 0 */3 * *'   # every 3 days at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Touch sellers via REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret; skipping."
            exit 0
          fi
          curl --fail --silent --show-error \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/sellers?select=id&limit=1" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n"
